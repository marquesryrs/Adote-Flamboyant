<head>
<meta charset="UTF-8" />

<title>Obrigado — Adote Flamboyant</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet" />
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', sans-serif;
  background: #FDF7EF;
  color: #2A1A0A;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 32px 24px;
}
.pata { font-size: 48px; margin-bottom: 24px; }
h1 {
  font-family: 'Fraunces', serif;
  font-size: 36px;
  color: #5C2E00;
  margin-bottom: 12px;
  line-height: 1.2;
}
h1 em { color: #C05A1A; font-style: italic; }
p {
  font-size: 15px;
  color: #7A6555;
  max-width: 400px;
  line-height: 1.7;
  margin-bottom: 32px;
}
a {
  display: inline-block;
  font-size: 14px;
  color: #C05A1A;
  border-bottom: 1px solid #C05A1A;
  padding-bottom: 2px;
  text-decoration: none;
}
a:hover { opacity: .75; }
</style>
</head>
<body>
  <div class="pata">🐾</div>
